<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candy Clash Sugar 🍬</title>
  
  <!-- Tailwind CSS para Estilização Rápida e Responsiva -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React e ReactDOM via CDN (Sem necessidade de compilação local) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel Standalone para transpilar JSX direto no navegador -->
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>

  <!-- Three.js para o Fundo 3D Imersivo -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- SDK oficial do Supabase (Versão UMD clássica para evitar erros de importação) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    /* Transições e Animações Personalizadas Candy Clash */
    @keyframes fade-out-up {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-30px); }
    }
    .animate-fade-out-up {
      animation: fade-out-up 2s ease-out forwards;
    }
    @keyframes fade-in {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    .animate-fade-in {
      animation: fade-in 0.3s ease-out forwards;
    }
    
    /* Efeito Squishy elástico interativo para os botões e abas */
    .btn-squish {
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s;
    }
    .btn-squish:active {
      transform: scale(0.85, 1.25) translateY(-4px);
    }
    .btn-squish:hover {
      transform: scale(1.05);
    }

    /* Estilização suave de scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(253, 244, 245, 0.5);
    }
    ::-webkit-scrollbar-thumb {
      background: #f472b6;
      border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-pink-100 overflow-hidden m-0 p-0 select-none">

  <!-- Ponto de Montagem do React -->
  <div id="root"></div>

  <!-- Código transpilado pelo Babel livre de async/await para evitar importações automáticas e erros no navegador -->
  <script type="text/babel">
    // Obtendo hooks do React e Supabase globais de forma direta (Sem usar declarações de 'import')
    const { useState, useEffect, useRef } = window.React;
    const { createClient } = window.supabase;

    // Inicialização do cliente Supabase
    const SUPABASE_URL = "https://gktmtnmagxjpqnkcrsqp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_WbgedqIx3nPNi1uZhTz4Yw_KNInX-r-";
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Sintetizador de áudio relaxante ASMR para interações táteis (Web Audio API)
    const playSquishSound = (type = 'bubble') => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        if (type === 'bubble') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          
          osc.type = 'sine';
          osc.frequency.setValueAtTime(140, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(750, ctx.currentTime + 0.12);
          
          gain.gain.setValueAtTime(0.25, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.005, ctx.currentTime + 0.12);
          
          osc.start();
          osc.stop(ctx.currentTime + 0.13);
        } else if (type === 'sparkle') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(920, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1900, ctx.currentTime + 0.25);
          
          gain.gain.setValueAtTime(0.12, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.005, ctx.currentTime + 0.25);
          
          osc.start();
          osc.stop(ctx.currentTime + 0.26);
        } else if (type === 'pop') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          
          osc.type = 'sine';
          osc.frequency.setValueAtTime(280, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.18);
          
          gain.gain.setValueAtTime(0.35, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.005, ctx.currentTime + 0.18);
          
          osc.start();
          osc.stop(ctx.currentTime + 0.19);
        }
      } catch (e) {
        console.log("AudioContext bloqueado ou não suportado.");
      }
    };

    function App() {
      // Estados de Autenticação / Cadastro
      const [session, setSession] = useState(null); 
      const [currentUser, setCurrentUser] = useState(null);
      const [authMode, setAuthMode] = useState('login'); 
      const [formNick, setFormNick] = useState('');
      const [formPassword, setFormPassword] = useState('');
      const [formError, setFormError] = useState('');
      const [formSuccess, setFormSuccess] = useState('');
      
      // Estado de Navegação e Ecrãs
      const [activeTab, setActiveTab] = useState('chats'); 
      const [activeChat, setActiveChat] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [myChats, setMyChats] = useState([]);
      const [currentChatMessages, setCurrentChatMessages] = useState([]);
      const [allProfiles, setAllProfiles] = useState([]); 
      const [blocksList, setBlocksList] = useState([]);

      // Estados de Input de Mensagem e PinkCoins Em Tempo Real
      const [messageInput, setMessageInput] = useState('');
      const [pendingPinkCoins, setPendingPinkCoins] = useState(0);
      const [gainingCoinsAnim, setGainingCoinsAnim] = useState(false);
      const [lastGainedAmount, setLastGainedAmount] = useState(0);

      // Estados dos Mini-Eventos (Baús e Tarefas Aleatórias)
      const [randomEvent, setRandomEvent] = useState(null);
      const [eventTimeLeft, setEventTimeLeft] = useState(0);
      const [toastMessage, setToastMessage] = useState(null);

      // Estados de Modais & Mochila (Inventário)
      const [isBagOpen, setIsBagOpen] = useState(false);
      const [trollModeActive, setTrollModeActive] = useState(false);
      const [avatarInput, setAvatarInput] = useState('');
      const [recadoInput, setRecadoInput] = useState('');

      // Referências
      const fileInputRef = useRef(null);
      const messagesEndRef = useRef(null);
      const [isRecording, setIsRecording] = useState(false);

      // --- EFEITO 1: Fundo 3D Imersivo em Loop Infinito e Paralaque Interativo com Cursor ---
      useEffect(() => {
        if (!window.THREE) return;
        const THREE = window.THREE;
        const container = document.getElementById('threejs-glitter-bg');
        if (!container) return;

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xffb7b2, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Iluminação Mágica e Colorida
        const ambientLight = new THREE.AmbientLight(0xffe5ec, 1.2);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffb7b2, 1.5);
        dirLight1.position.set(10, 20, 10);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xcaffbf, 1);
        dirLight2.position.set(-10, -20, -10);
        scene.add(dirLight2);

        // Partículas de Glitter
        const particleGeometry = new THREE.BufferGeometry();
        const particleCount = 400;
        const posArray = new Float32Array(particleCount * 3);
        const colorArray = new Float32Array(particleCount * 3);

        const colorsPalette = [
          new THREE.Color(0xffb7b2),
          new THREE.Color(0xffdac1),
          new THREE.Color(0xe2f0cb),
          new THREE.Color(0xb5ead7),
          new THREE.Color(0xffc6ff),
        ];

        for (let i = 0; i < particleCount * 3; i += 3) {
          posArray[i] = (Math.random() - 0.5) * 80;
          posArray[i + 1] = (Math.random() - 0.5) * 80;
          posArray[i + 2] = (Math.random() - 0.5) * 80;

          const randomColor = colorsPalette[Math.floor(Math.random() * colorsPalette.length)];
          colorArray[i] = randomColor.r;
          colorArray[i + 1] = randomColor.g;
          colorArray[i + 2] = randomColor.b;
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

        const particleMaterial = new THREE.PointsMaterial({
          size: 0.6,
          vertexColors: true,
          transparent: true,
          opacity: 0.8,
          blending: THREE.AdditiveBlending
        });

        const starParticles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(starParticles);

        // Doces Flutuantes 3D
        const shapes = [];
        const geometrySphere = new THREE.IcosahedronGeometry(1.2, 1);
        const geometryTorus = new THREE.TorusGeometry(0.8, 0.3, 8, 24);

        for (let i = 0; i < 25; i++) {
          const isSphere = Math.random() > 0.5;
          const geom = isSphere ? geometrySphere : geometryTorus;
          const mat = new THREE.MeshStandardMaterial({
            color: colorsPalette[Math.floor(Math.random() * colorsPalette.length)].getHex(),
            roughness: 0.1,
            metalness: 0.1,
            flatShading: true,
          });

          const mesh = new THREE.Mesh(geom, mat);
          mesh.position.set(
            (Math.random() - 0.5) * 60,
            (Math.random() - 0.5) * 60,
            (Math.random() - 0.5) * 40
          );
          mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
          
          const scale = 0.5 + Math.random() * 1.2;
          mesh.scale.set(scale, scale, scale);

          mesh.userData = {
            rotX: (Math.random() - 0.5) * 0.01,
            rotY: (Math.random() - 0.5) * 0.01,
            floatSpeed: 0.002 + Math.random() * 0.005,
            startY: mesh.position.y
          };

          shapes.push(mesh);
          scene.add(mesh);
        }

        // Rastrear movimentos do rato para mover a câmera suavemente (paralaxe imersivo)
        let mouseX = 0, mouseY = 0;
        const handleMouseMove = (event) => {
          mouseX = (event.clientX - window.innerWidth / 2) * 0.02;
          mouseY = (event.clientY - window.innerHeight / 2) * 0.02;
        };
        window.addEventListener('mousemove', handleMouseMove);

        let clock = new THREE.Clock();
        const animate = () => {
          requestAnimationFrame(animate);
          const elapsedTime = clock.getElapsedTime();

          // Glitter girando infinitamente sem soluçar
          starParticles.rotation.y = elapsedTime * 0.03;
          starParticles.rotation.x = elapsedTime * 0.01;

          // Doces flutuando suavemente
          shapes.forEach(shape => {
            shape.rotation.x += shape.userData.rotX;
            shape.rotation.y += shape.userData.rotY;
            // Loop de onda de flutuação pura sem início e fim marcantes (trigonométrico contínuo)
            shape.position.y = shape.userData.startY + Math.sin(elapsedTime * shape.userData.floatSpeed * 10) * 2;
          });

          // Suavizar movimento de paralaxe da câmera rumo ao rato
          camera.position.x += (mouseX - camera.position.x) * 0.05;
          camera.position.y += (-mouseY - camera.position.y) * 0.05;
          camera.lookAt(scene.position);

          renderer.render(scene, camera);
        };

        animate();

        const handleResize = () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        };
        window.addEventListener('resize', handleResize);

        return () => {
          window.removeEventListener('resize', handleResize);
          window.removeEventListener('mousemove', handleMouseMove);
          if (container.contains(renderer.domElement)) {
            container.removeChild(renderer.domElement);
          }
        };
      }, []);

      // --- EFEITO 2: Monitorização de Login do Supabase ---
      useEffect(() => {
        const savedUserId = localStorage.getItem('candy_clash_user_id');
        if (savedUserId) {
          setSession(savedUserId);
          fetchCurrentUserProfile(savedUserId);
        }
      }, []);

      // Polling inteligente e seguro para carregar os dados via Promise Chains (.then())
      useEffect(() => {
        if (!currentUser) return;

        loadMyChats();
        loadAllProfiles();
        loadBlocks();
        updateOnlineStatus(true);

        const pollInterval = setInterval(() => {
          if (activeChat) {
            loadChatMessages(activeChat.id);
          }
          loadMyChats();
          loadAllProfiles();
        }, 3000);

        const intervalPou = setInterval(() => {
          adjustStats(-2, -1, 0); // perda gradual do Pou
        }, 60000);

        return () => {
          clearInterval(pollInterval);
          clearInterval(intervalPou);
          updateOnlineStatus(false);
        };
      }, [currentUser, activeChat?.id]);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [currentChatMessages]);

      useEffect(() => {
        if (randomEvent) {
          if (eventTimeLeft > 0) {
            const timer = setTimeout(() => setEventTimeLeft(prev => prev - 1), 1000);
            return () => clearTimeout(timer);
          } else {
            setRandomEvent(null);
            showToast("⏳ O tempo para o evento expirou!");
          }
        }
      }, [randomEvent, eventTimeLeft]);

      useEffect(() => {
        if (!currentUser) return;
        const intervalEvent = setInterval(() => {
          if (currentUser.happiness >= 70 && !randomEvent && Math.random() < 0.4) {
            spawnRandomEvent();
          }
        }, 45000);

        return () => clearInterval(intervalEvent);
      }, [currentUser, randomEvent]);

      // --- ACÇÕES ---
      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(null), 4000);
      };

      const updateOnlineStatus = (online) => {
        if (!currentUser) return;
        supabaseClient.from('profiles').update({
          is_online: online,
          last_seen: new Date().toISOString()
        }).eq('id', currentUser.id).then(() => {});
      };

      const fetchCurrentUserProfile = (uid) => {
        supabaseClient.from('profiles').select('*').eq('id', uid).single().then((res) => {
          if (!res.error && res.data) {
            setCurrentUser(res.data);
            setAvatarInput(res.data.avatar_url || '');
            setRecadoInput(res.data.recado || '');
          }
        });
      };

      const loadAllProfiles = () => {
        supabaseClient.from('profiles').select('*').then((res) => {
          if (res.data) setAllProfiles(res.data);
        });
      };

      const loadBlocks = () => {
        if (!currentUser) return;
        supabaseClient.from('blocks').select('*').eq('blocker_id', currentUser.id).then((res) => {
          if (res.data) setBlocksList(res.data.map(b => b.blocked_id));
        });
      };

      const loadMyChats = () => {
        if (!currentUser) return;
        supabaseClient.from('chat_members').select('chat_id').eq('user_id', currentUser.id).then((res) => {
          if (!res.data || res.data.length === 0) return;
          const chatIds = res.data.map(mc => mc.chat_id);
          supabaseClient.from('chats').select('*, chat_members(*, profiles(*))').in('id', chatIds).then((chatRes) => {
            if (chatRes.data) {
              setMyChats(chatRes.data);
            }
          });
        });
      };

      const adjustStats = (energyDiff, happinessDiff, powerDiff) => {
        if (!currentUser) return;
        
        let newEnergy = Math.max(0, Math.min(100, (currentUser.energy || 100) + energyDiff));
        let newHappiness = Math.max(0, Math.min(100, (currentUser.happiness || 100) + happinessDiff));
        let newPower = Math.max(0, (currentUser.power || 0) + powerDiff);

        supabaseClient.from('profiles').update({
          energy: newEnergy,
          happiness: newHappiness,
          power: newPower
        }).eq('id', currentUser.id).then((res) => {
          if (!res.error) {
            setCurrentUser(prev => ({ ...prev, energy: newEnergy, happiness: newHappiness, power: newPower }));
          }
        });
      };

      const spawnRandomEvent = () => {
        const isChest = Math.random() > 0.5;
        playSquishSound('sparkle');
        if (isChest) {
          setRandomEvent({
            type: 'chest',
            timer: 300,
            reward: Math.floor(50 + Math.random() * 150)
          });
          setEventTimeLeft(300);
          showToast("🎁 Um Baú Doce misterioso apareceu no teu ecrã!");
        } else {
          const emojis = ['😍', '🍬', '🦄', '💖', '🍭'];
          const chosenEmoji = emojis[Math.floor(Math.random() * emojis.length)];
          setRandomEvent({
            type: 'task',
            timer: 180,
            taskDesc: `Envia o emoji ${chosenEmoji} para um amigo agora!`,
            emojiNeeded: chosenEmoji,
            reward: Math.floor(80 + Math.random() * 100)
          });
          setEventTimeLeft(180);
          showToast("📜 Nova Tarefa Doce ativa! Abre uma conversa.");
        }
      };

      const claimChestReward = () => {
        if (!randomEvent || !currentUser) return;
        playSquishSound('pop');
        
        let multiplier = currentUser.happiness >= 90 ? 2 : 1;
        const finalReward = randomEvent.reward * multiplier;

        supabaseClient.from('profiles').update({
          pink_coins: (currentUser.pink_coins || 0) + finalReward,
          happiness: Math.min(100, (currentUser.happiness || 100) + 10)
        }).eq('id', currentUser.id).then((res) => {
          if (!res.error) {
            setCurrentUser(prev => ({ ...prev, pink_coins: (prev.pink_coins || 0) + finalReward, happiness: Math.min(100, (prev.happiness || 100) + 10) }));
            showToast(`🎁 Parabéns! Abriste o Baú e ganhaste +${finalReward} PinkCoins!`);
            setRandomEvent(null);
          }
        });
      };

      // --- CADASTRO DIRECTO ---
      const handleRegister = (e) => {
        e.preventDefault();
        setFormError('');
        setFormSuccess('');

        if (!formNick.trim() || formNick.length > 15) {
          setFormError('O Nick não pode ter mais do que 15 caracteres.');
          return;
        }
        if (formPassword.length < 6) {
          setFormError('A senha deve ter no mínimo 6 caracteres.');
          return;
        }

        const formattedNick = formNick.trim().charAt(0).toUpperCase() + formNick.trim().slice(1);

        supabaseClient.from('profiles').select('nick').eq('nick', formattedNick).maybeSingle().then((checkRes) => {
          if (checkRes.data) {
            setFormError('Este nick já está em uso! Escolha outro doçura.');
            return;
          }

          // Gerar uma tag de 4 dígitos única
          const uniqueTag = Math.floor(1000 + Math.random() * 9000).toString();

          supabaseClient.from('profiles').insert({
            nick: formattedNick,
            password: formPassword,
            tag: uniqueTag,
            avatar_url: `https://api.dicebear.com/7.x/adventurer/svg?seed=${formattedNick}`,
            recado: 'Olá! Estou a usar o Candy Clash Sugar! 🍭',
            pink_coins: 100,
            energy: 100,
            happiness: 100,
            power: 0,
            is_online: true,
            inventory: []
          }).then((insertRes) => {
            if (insertRes.error) {
              setFormError('Erro ao cadastrar perfil. Verifique as regras de cadastro.');
            } else {
              setFormSuccess('Conta criada com sucesso! Faça Login agora doçura! ✨');
              playSquishSound('sparkle');
              setFormNick(formattedNick);
              setAuthMode('login');
            }
          });
        });
      };

      // --- LOGIN DIRECTO ---
      const handleLogin = (e) => {
        e.preventDefault();
        setFormError('');
        setFormSuccess('');

        const formattedNick = formNick.trim().charAt(0).toUpperCase() + formNick.trim().slice(1);

        supabaseClient.from('profiles').select('*').eq('nick', formattedNick).eq('password', formPassword).maybeSingle().then((res) => {
          if (res.error || !res.data) {
            setFormError('Dados incorretos. Verifica o teu Nick e senha!');
          } else {
            setSession(res.data.id);
            localStorage.setItem('candy_clash_user_id', res.data.id);
            setCurrentUser(res.data);
            playSquishSound('sparkle');
            showToast(`🍭 Bem-vindo de volta, ${res.data.nick}!`);
          }
        }).catch(() => {
          setFormError('Erro de conexão ao efetuar login.');
        });
      };

      const handleLogout = () => {
        playSquishSound('pop');
        // Desconectar online
        if (currentUser) {
          supabaseClient.from('profiles').update({
            is_online: false,
            last_seen: new Date().toISOString()
          }).eq('id', currentUser.id).then(() => {
            localStorage.removeItem('candy_clash_user_id');
            setSession(null);
            setCurrentUser(null);
            setActiveChat(null);
          });
        }
      };

      // --- PESQUISA ---
      const handleSearchUsers = () => {
        if (!searchQuery.trim()) return;
        
        let query = supabaseClient.from('profiles').select('*');
        if (searchQuery.startsWith('#')) {
          query = query.eq('tag', searchQuery.replace('#', ''));
        } else {
          query = query.ilike('nick', `%${searchQuery}%`);
        }

        query.then((res) => {
          if (res.data) {
            setSearchResults(res.data.filter(p => p.id !== currentUser.id));
          }
        });
      };

      const startOrOpenChat = (targetUser) => {
        playSquishSound('bubble');
        
        supabaseClient.from('chat_members').select('chat_id').eq('user_id', currentUser.id).then((myRes) => {
          supabaseClient.from('chat_members').select('chat_id').eq('user_id', targetUser.id).then((targetRes) => {
            let commonChatId = null;
            if (myRes.data && targetRes.data) {
              const myIds = myRes.data.map(m => m.chat_id);
              const targetIds = targetRes.data.map(t => t.chat_id);
              commonChatId = myIds.find(id => targetIds.includes(id));
            }

            if (commonChatId) {
              supabaseClient.from('chats').select('*, chat_members(*, profiles(*))').eq('id', commonChatId).single().then((existingRes) => {
                if (existingRes.data) {
                  setActiveChat(existingRes.data);
                  loadChatMessages(commonChatId);
                }
              });
            } else {
              supabaseClient.from('chats').insert({}).select().single().then((newRes) => {
                if (newRes.error) return;
                const newChat = newRes.data;

                supabaseClient.from('chat_members').insert([
                  { chat_id: newChat.id, user_id: currentUser.id },
                  { chat_id: newChat.id, user_id: targetUser.id }
                ]).then(() => {
                  supabaseClient.from('chats').select('*, chat_members(*, profiles(*))').eq('id', newChat.id).single().then((fullRes) => {
                    if (fullRes.data) {
                      setActiveChat(fullRes.data);
                      setCurrentChatMessages([]);
                      loadMyChats();
                    }
                  });
                });
              });
            }
          });
        });

        setSearchQuery('');
        setSearchResults([]);
      };

      const loadChatMessages = (chatId) => {
        supabaseClient.from('messages').select('*').eq('chat_id', chatId).order('created_at', { ascending: true }).then((res) => {
          if (res.data) {
            setCurrentChatMessages(res.data);
          }
        });
      };

      const toggleBlockUser = (targetId) => {
        playSquishSound('pop');
        if (blocksList.includes(targetId)) {
          supabaseClient.from('blocks').delete().eq('blocker_id', currentUser.id).eq('blocked_id', targetId).then(() => {
            setBlocksList(prev => prev.filter(id => id !== targetId));
            showToast("Candy desbloqueado! 🌸");
          });
        } else {
          supabaseClient.from('blocks').insert({ blocker_id: currentUser.id, blocked_id: targetId }).then(() => {
            setBlocksList(prev => [...prev, targetId]);
            showToast("Utilizador bloqueado com sucesso!");
          });
        }
      };

      const clearCurrentChat = () => {
        if (!activeChat) return;
        playSquishSound('pop');
        supabaseClient.from('messages').delete().eq('chat_id', activeChat.id).then((res) => {
          if (!res.error) {
            setCurrentChatMessages([]);
            showToast("Conversa limpa!");
          }
        });
      };

      const deleteCurrentChat = () => {
        if (!activeChat) return;
        playSquishSound('pop');
        supabaseClient.from('chats').delete().eq('id', activeChat.id).then((res) => {
          if (!res.error) {
            setActiveChat(null);
            setCurrentChatMessages([]);
            loadMyChats();
            showToast("Conversa eliminada!");
          }
        });
      };

      const handleTyping = (e) => {
        const text = e.target.value;
        setMessageInput(text);
        
        if (text.length > messageInput.length) {
          setPendingPinkCoins(prev => prev + 1);
        } else if (text.length < messageInput.length) {
          setPendingPinkCoins(prev => Math.max(0, prev - 1));
        }
      };

      const sendMessage = (e) => {
        e.preventDefault();
        if (!messageInput.trim() || !activeChat) return;

        const partner = getChatPartner(activeChat);
        if (blocksList.includes(partner?.id)) {
          showToast("Desbloqueia esta pessoa para enviar mensagens!");
          return;
        }

        const textToSend = messageInput;
        setMessageInput('');
        const coinsEarned = pendingPinkCoins;
        setPendingPinkCoins(0);

        supabaseClient.from('messages').insert({
          chat_id: activeChat.id,
          sender_id: currentUser.id,
          text: textToSend
        }).then((res) => {
          if (!res.error) {
            playSquishSound('bubble');
            loadChatMessages(activeChat.id);

            // CORREÇÃO: Atualizar PinkCoins locais instantaneamente ao enviar mensagens com sucesso!
            if (coinsEarned > 0) {
              setLastGainedAmount(coinsEarned);
              setGainingCoinsAnim(true);
              setTimeout(() => setGainingCoinsAnim(false), 2000);

              const newCoins = (currentUser.pink_coins || 0) + coinsEarned;
              const energyGain = textToSend.length;

              supabaseClient.from('profiles').update({
                pink_coins: newCoins,
                energy: Math.min(100, (currentUser.energy || 100) + energyGain)
              }).eq('id', currentUser.id).then((updRes) => {
                if (!updRes.error) {
                  // Sincroniza a interface e o saldo local do jogador em tempo real!
                  setCurrentUser(prev => ({
                    ...prev,
                    pink_coins: newCoins,
                    energy: Math.min(100, (prev.energy || 100) + energyGain)
                  }));
                }
              });
            }

            if (randomEvent && randomEvent.type === 'task' && textToSend.includes(randomEvent.emojiNeeded)) {
              const rewardBonus = randomEvent.reward;
              supabaseClient.from('profiles').update({
                pink_coins: (currentUser.pink_coins || 0) + rewardBonus,
                happiness: Math.min(100, (currentUser.happiness || 100) + 15)
              }).eq('id', currentUser.id).then((taskRes) => {
                if (!taskRes.error) {
                  setCurrentUser(prev => ({
                    ...prev,
                    pink_coins: (prev.pink_coins || 0) + rewardBonus,
                    happiness: Math.min(100, (prev.happiness || 100) + 15)
                  }));
                  setRandomEvent(null);
                  showToast("🎉 Concluíste a tarefa! + " + rewardBonus + " PinkCoins!");
                  playSquishSound('sparkle');
                }
              });
            }
          }
        });
      };

      const sendMediaMessage = (type, url) => {
        if (!activeChat) return;
        supabaseClient.from('messages').insert({
          chat_id: activeChat.id,
          sender_id: currentUser.id,
          media_url: url,
          media_type: type,
          text: type === 'image' ? '📷 Imagem Doce' : '🎵 Áudio Relaxante'
        }).then((res) => {
          if (!res.error) {
            playSquishSound('bubble');
            adjustStats(15, 5, 0);
            loadChatMessages(activeChat.id);
          }
        });
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const fakeUrl = `https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&q=80&w=400`;
          sendMediaMessage('image', fakeUrl);
        }
      };

      const toggleRecording = () => {
        if (isRecording) {
          setIsRecording(false);
          sendMediaMessage('audio', '#');
        } else {
          setIsRecording(true);
          playSquishSound('pop');
          showToast("🎙️ Gravando áudio ASMR...");
        }
      };

      const buyStoreItem = (itemName, cost) => {
        if ((currentUser.pink_coins || 0) < cost) {
          showToast("❌ Não tens PinkCoins suficientes para esta doçura!");
          return;
        }

        playSquishSound('sparkle');
        let updatedInventory = [...getInventory(currentUser)];

        if (itemName === 'Troll') {
          updatedInventory.push({ name: 'Troll Card', qty: 1, desc: 'Trola um amigo editando 1 mensagem dele!' });
        } else if (itemName === 'Poder') {
          updatedInventory.push({ name: 'Poder Estelar', qty: 1, desc: 'Envia para um amigo para subir no Rank!' });
        } else if (itemName === 'Troca de Nick') {
          updatedInventory.push({ name: 'Cartão de Alcunha', qty: 1, desc: 'Permite trocar o teu nick 1 vez.' });
        }

        supabaseClient.from('profiles').update({
          pink_coins: currentUser.pink_coins - cost,
          inventory: updatedInventory
        }).eq('id', currentUser.id).then((res) => {
          if (!res.error) {
            setCurrentUser(prev => ({ ...prev, pink_coins: prev.pink_coins - cost, inventory: updatedInventory }));
            showToast(`🛒 Compraste ${itemName} com sucesso!`);
          }
        });
      };

      const useInventoryItem = (itemName) => {
        if (itemName === 'Troll Card') {
          setTrollModeActive(true);
          setIsBagOpen(false);
          showToast("😈 Modo Troll Ativo! Toca em qualquer mensagem do teu amigo para a editares!");
        } else if (itemName === 'Cartão de Alcunha') {
          const newNick = prompt("Escreve o teu novo Nick Candy (máx 15 caracteres):");
          if (!newNick) return;
          
          const formatted = newNick.charAt(0).toUpperCase() + newNick.slice(1);
          if (formatted.length > 15) {
            showToast("Erro: Máximo de 15 letras!");
            return;
          }

          const updatedInv = getInventory(currentUser).filter(item => item.name !== 'Cartão de Alcunha');
          
          supabaseClient.from('profiles').update({
            nick: formatted,
            inventory: updatedInv
          }).eq('id', currentUser.id).then((res) => {
            if (res.error) {
              showToast("❌ Este nick já está a ser utilizado por outra pessoa!");
            } else {
              setCurrentUser(prev => ({ ...prev, nick: formatted, inventory: updatedInv }));
              showToast("✨ Alcunha alterada com sucesso!");
              loadAllProfiles();
            }
          });
        } else if (itemName === 'Poder Estelar') {
          if (!activeChat) {
            showToast("❌ Abre primeiro a conversa de um amigo para lhe dares poder!");
            return;
          }
          const partner = getChatPartner(activeChat);
          if (!partner || !partner.id) return;

          playSquishSound('sparkle');
          const updatedInv = getInventory(currentUser).filter(item => item.name !== 'Poder Estelar');

          supabaseClient.from('profiles').update({
            power: (partner.power || 0) + 1
          }).eq('id', partner.id).then(() => {
            supabaseClient.from('profiles').update({
              inventory: updatedInv
            }).eq('id', currentUser.id).then(() => {
              setCurrentUser(prev => ({ ...prev, inventory: updatedInv }));
              showToast(`💖 Enviaste +1 de Poder para ${partner.nick}!`);
              loadAllProfiles();
            });
          });
        }
      };

      const trollMessage = (msg) => {
        if (!trollModeActive) return;
        if (msg.sender_id === currentUser.id) {
          showToast("Não podes trollar as tuas próprias mensagens!");
          return;
        }

        const trolledText = prompt("Edita a mensagem do teu amigo como quiseres: 😈");
        if (trolledText === null) return;

        playSquishSound('pop');
        
        supabaseClient.from('messages').update({
          text: trolledText + " 🦄 (TROLLADO!)",
          is_edited: true
        }).eq('id', msg.id).then((res) => {
          if (!res.error) {
            const updatedInv = getInventory(currentUser).map(item => {
              if (item.name === 'Troll Card') {
                return { ...item, qty: item.qty - 1 };
              }
              return item;
            }).filter(item => item.qty > 0);

            supabaseClient.from('profiles').update({ inventory: updatedInv }).eq('id', currentUser.id).then(() => {
              setCurrentUser(prev => ({ ...prev, inventory: updatedInv }));
              setTrollModeActive(false);
              showToast("🎉 Mensagem trollada com sucesso!");
              loadChatMessages(activeChat.id);
            });
          }
        });
      };

      const updateProfileSettings = () => {
        if ((currentUser.energy || 100) < 80) {
          showToast("⚠️ Precisas de pelo menos 80% de Energia para mudar as tuas definições!");
          return;
        }

        supabaseClient.from('profiles').update({
          avatar_url: avatarInput,
          recado: recadoInput
        }).eq('id', currentUser.id).then((res) => {
          if (!res.error) {
            setCurrentUser(prev => ({ ...prev, avatar_url: avatarInput, recado: recadoInput }));
            showToast("✨ Perfil atualizado!");
          }
        });
      };

      const getChatPartner = (chat) => {
        if (!chat || !chat.chat_members) return { id: '', nick: 'Desconhecido', tag: '0000', avatar_url: '', is_online: false, last_seen: null, power: 0 };
        const partnerMember = chat.chat_members.find(m => m.user_id !== currentUser?.id);
        let profileObj = partnerMember?.profiles;
        if (Array.isArray(profileObj)) {
          profileObj = profileObj[0];
        }
        return profileObj || { id: '', nick: 'Desconhecido', tag: '0000', avatar_url: '', is_online: false, last_seen: null, power: 0 };
      };

      const getInventory = (user) => {
        if (!user || !user.inventory) return [];
        if (Array.isArray(user.inventory)) return user.inventory;
        try {
          const parsed = typeof user.inventory === 'string' ? JSON.parse(user.inventory) : user.inventory;
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          return [];
        }
      };

      return (
        <div className="relative w-screen h-screen overflow-hidden font-sans text-pink-900 selection:bg-pink-300">
          
          {/* Fundo 3D */}
          <div id="threejs-glitter-bg" className="absolute top-0 left-0 w-full h-full -z-10 pointer-events-none" />
          <div className="absolute top-0 left-0 w-full h-full bg-pink-100 bg-opacity-30 -z-10 pointer-events-none" />

          {/* Toast */}
          {toastMessage && (
            <div className="absolute top-5 left-1/2 transform -translate-x-1/2 z-50 bg-white bg-opacity-90 border-2 border-pink-300 px-6 py-3 rounded-full shadow-lg flex items-center gap-2 animate-bounce">
              <span className="text-xl">🍬</span>
              <p className="text-pink-600 font-bold text-sm md:text-base">{toastMessage}</p>
            </div>
          )}

          {/* Evento Aleatório */}
          {randomEvent && (
            <div className="absolute bottom-20 right-5 z-40 bg-white bg-opacity-95 border-4 border-pink-400 p-4 rounded-3xl shadow-2xl flex flex-col items-center gap-2 max-w-[200px] animate-pulse">
              {randomEvent.type === 'chest' ? (
                <>
                  <span className="text-4xl cursor-pointer hover:scale-125 transition-transform" onClick={claimChestReward}>🎁</span>
                  <p className="text-xs font-bold text-center">Toca para abrir o Baú!</p>
                  <p className="text-xs bg-pink-200 px-2 py-1 rounded-full text-pink-700 font-mono">
                    {Math.floor(eventTimeLeft / 60)}:{(eventTimeLeft % 60).toString().padStart(2, '0')}
                  </p>
                </>
              ) : (
                <>
                  <span className="text-4xl">📜</span>
                  <p className="text-xs font-bold text-center text-pink-600">{randomEvent.taskDesc}</p>
                  <p className="text-xs bg-pink-200 px-2 py-1 rounded-full text-pink-700 font-mono">
                    {Math.floor(eventTimeLeft / 60)}:{(eventTimeLeft % 60).toString().padStart(2, '0')}
                  </p>
                </>
              )}
            </div>
          )}

          {/* Animação Moedas */}
          {gainingCoinsAnim && (
            <div className="absolute top-20 right-10 z-50 pointer-events-none flex flex-col items-center animate-fade-out-up">
              <span className="text-2xl font-black text-pink-600 drop-shadow-md">+{lastGainedAmount} PinkCoins! 🌸</span>
            </div>
          )}

          {/* Autenticação */}
          {!session ? (
            <div className="w-full h-full flex items-center justify-center p-4">
              <div className="bg-white bg-opacity-90 backdrop-blur-md rounded-3xl p-6 md:p-8 max-w-md w-full border-4 border-pink-300 shadow-2xl relative overflow-hidden">
                <div className="absolute -top-10 -right-10 w-24 h-24 bg-pink-200 rounded-full opacity-50" />
                <div className="absolute -bottom-10 -left-10 w-24 h-24 bg-pink-300 rounded-full opacity-50" />

                <div className="text-center mb-6">
                  <h1 className="text-3xl md:text-4xl font-extrabold text-pink-500 drop-shadow-sm flex justify-center items-center gap-2">
                    <span>🍬</span> Candy Clash <span>🍭</span>
                  </h1>
                  <p className="text-pink-400 font-semibold text-xs mt-1">Conecta-te com o teu world açucarado!</p>
                </div>

                <div className="flex bg-pink-100 rounded-full p-1 mb-6 border border-pink-200">
                  <button
                    className={`flex-1 py-2 text-sm font-bold rounded-full btn-squish ${authMode === 'login' ? 'bg-pink-400 text-white shadow-md' : 'text-pink-500'}`}
                    onClick={() => { playSquishSound('bubble'); setAuthMode('login'); }}
                  >
                    Entrar
                  </button>
                  <button
                    className={`flex-1 py-2 text-sm font-bold rounded-full btn-squish ${authMode === 'register' ? 'bg-pink-400 text-white shadow-md' : 'text-pink-500'}`}
                    onClick={() => { playSquishSound('bubble'); setAuthMode('register'); }}
                  >
                    Cadastrar
                  </button>
                </div>

                {formError && (
                  <div className="bg-red-100 text-red-600 p-3 rounded-2xl mb-4 text-xs font-bold text-center border border-red-200 animate-pulse">
                    {formError}
                  </div>
                )}
                {formSuccess && (
                  <div className="bg-green-100 text-green-600 p-3 rounded-2xl mb-4 text-xs font-bold text-center border border-green-200">
                    {formSuccess}
                  </div>
                )}

                {authMode === 'login' ? (
                  <form onSubmit={handleLogin} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-pink-500 mb-1">🍭 SEU ALCUNHA / NICK (Até 15 caracteres)</label>
                      <input
                        type="text"
                        maxLength={15}
                        value={formNick}
                        onChange={(e) => setFormNick(e.target.value)}
                        placeholder="Ex: Candyqueen"
                        required
                        className="w-full px-4 py-3 bg-pink-50 border-2 border-pink-200 rounded-2xl focus:outline-none focus:border-pink-400 transition-colors font-bold text-pink-700 shadow-inner"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-pink-500 mb-1">🔑 SUA SENHA (Mín. 6 caracteres)</label>
                      <input
                        type="password"
                        value={formPassword}
                        onChange={(e) => setFormPassword(e.target.value)}
                        placeholder="••••••"
                        required
                        className="w-full px-4 py-3 bg-pink-50 border-2 border-pink-200 rounded-2xl focus:outline-none focus:border-pink-400 transition-colors text-pink-700 shadow-inner"
                      />
                    </div>
                    <button
                      type="submit"
                      className="w-full bg-pink-400 hover:bg-pink-500 active:scale-95 text-white font-black py-4 rounded-2xl shadow-md btn-squish mt-4 border-b-4 border-pink-600 flex justify-center items-center gap-2 text-sm"
                    >
                      Entrar no Candy Clash 🍬
                    </button>
                  </form>
                ) : (
                  <form onSubmit={handleRegister} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-pink-500 mb-1">🍭 ESCOLHER NICK (Máx 15 caracteres)</label>
                      <input
                        type="text"
                        maxLength={15}
                        value={formNick}
                        onChange={(e) => setFormNick(e.target.value)}
                        placeholder="Candyqueen"
                        required
                        className="w-full px-4 py-3 bg-pink-50 border-2 border-pink-200 rounded-2xl focus:outline-none focus:border-pink-400 transition-colors font-bold text-pink-700 shadow-inner"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-pink-500 mb-1">🔑 CRIAR SENHA (Mín. 6 caracteres)</label>
                      <input
                        type="password"
                        value={formPassword}
                        onChange={(e) => setFormPassword(e.target.value)}
                        placeholder="Mínimo 6 caracteres"
                        required
                        className="w-full px-4 py-3 bg-pink-50 border-2 border-pink-200 rounded-2xl focus:outline-none focus:border-pink-400 transition-colors text-pink-700 shadow-inner"
                      />
                    </div>
                    <button
                      type="submit"
                      className="w-full bg-pink-400 hover:bg-pink-500 active:scale-95 text-white font-black py-4 rounded-2xl shadow-md btn-squish mt-4 border-b-4 border-pink-600 flex justify-center items-center gap-2 text-sm"
                    >
                      Registrar Doçura ✨
                    </button>
                  </form>
                )}
              </div>
            </div>
          ) : (
            /* Interface Principal */
            <div className="w-full h-full flex flex-col md:flex-row p-2 md:p-4 gap-4 animate-fade-in">
              
              {/* Painel Lateral */}
              <div className="w-full md:w-[400px] flex flex-col bg-white bg-opacity-80 backdrop-blur-md rounded-3xl border-4 border-pink-200 shadow-xl overflow-hidden h-[45%] md:h-full">
                
                {/* Perfil & Status Pou */}
                <div className="bg-pink-400 p-4 text-white relative">
                  <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-3">
                      <img
                        src={currentUser?.avatar_url || `https://api.dicebear.com/7.x/adventurer/svg?seed=${currentUser?.nick}`}
                        alt="Perfil"
                        className="w-12 h-12 rounded-full border-2 border-white shadow-sm bg-white"
                      />
                      <div>
                        <h2 className="font-extrabold text-base flex items-center gap-1">
                          {currentUser?.nick} <span className="text-pink-200 text-xs font-mono">#{currentUser?.tag}</span>
                        </h2>
                        <p className="text-xs text-pink-100 truncate max-w-[150px]">{currentUser?.recado}</p>
                      </div>
                    </div>

                    <div className="flex items-center gap-1 bg-pink-500 bg-opacity-60 px-3 py-1.5 rounded-full border border-pink-300">
                      <span className="text-base">🌸</span>
                      <span className="font-mono font-black text-xs md:text-sm">{currentUser?.pink_coins || 0}</span>
                    </div>
                  </div>

                  <div className="grid grid-cols-3 gap-2 bg-pink-500 bg-opacity-40 p-2 rounded-2xl text-center text-xs">
                    <div>
                      <p className="font-bold text-[10px] text-pink-200">🔋 Energia</p>
                      <div className="w-full bg-pink-700 bg-opacity-40 h-2 rounded-full overflow-hidden mt-1">
                        <div className="bg-yellow-300 h-full transition-all" style={{ width: `${currentUser?.energy || 0}%` }} />
                      </div>
                      <span className="font-mono text-[10px] font-bold">{currentUser?.energy || 0}%</span>
                    </div>
                    <div>
                      <p className="font-bold text-[10px] text-pink-200">💖 Felicidade</p>
                      <div className="w-full bg-pink-700 bg-opacity-40 h-2 rounded-full overflow-hidden mt-1">
                        <div className="bg-green-300 h-full transition-all" style={{ width: `${currentUser?.happiness || 0}%` }} />
                      </div>
                      <span className="font-mono text-[10px] font-bold">{currentUser?.happiness || 0}%</span>
                    </div>
                    <div>
                      <p className="font-bold text-[10px] text-pink-200">⭐ Poder</p>
                      <span className="font-mono text-xs font-black block mt-0.5">{currentUser?.power || 0}</span>
                    </div>
                  </div>

                  <button
                    onClick={() => { playSquishSound('pop'); setIsBagOpen(!isBagOpen); }}
                    className="absolute top-2 right-2 bg-pink-200 hover:bg-pink-300 text-pink-600 p-2 rounded-full shadow-md hover:scale-105 active:scale-95 transition-all text-xs btn-squish"
                  >
                    🎒
                  </button>
                </div>

                {/* Tabs */}
                <div className="flex border-b border-pink-100 p-2 bg-pink-50 gap-1">
                  {['chats', 'rank', 'shop', 'profile'].map((tab) => (
                    <button
                      key={tab}
                      onClick={() => { playSquishSound('bubble'); setActiveTab(tab); }}
                      className={`flex-1 py-2 rounded-xl text-xs font-black capitalize transition-all transform active:scale-90 btn-squish ${activeTab === tab ? 'bg-pink-300 text-pink-800 shadow-md scale-105' : 'text-pink-400 hover:bg-pink-100'}`}
                    >
                      {tab === 'chats' && '💬 Chats'}
                      {tab === 'rank' && '👑 Rank'}
                      {tab === 'shop' && '🛒 Loja'}
                      {tab === 'profile' && '⚙️ Perfil'}
                    </button>
                  ))}
                </div>

                <div className="flex-1 overflow-y-auto p-3">
                  {activeTab === 'chats' && (
                    <div className="space-y-3">
                      <div className="flex gap-1.5">
                        <input
                          type="text"
                          placeholder="Pesquisar Nick ou #ID..."
                          value={searchQuery}
                          onChange={(e) => setSearchQuery(e.target.value)}
                          className="flex-1 px-3 py-2 bg-pink-50 border-2 border-pink-200 rounded-2xl focus:outline-none focus:border-pink-400 transition-colors text-xs font-bold"
                        />
                        <button
                          onClick={handleSearchUsers}
                          className="bg-pink-400 text-white px-4 rounded-2xl font-bold text-xs hover:bg-pink-500 transition-colors btn-squish"
                        >
                          Buscar
                        </button>
                      </div>

                      {searchResults.length > 0 && (
                        <div className="bg-pink-50 p-2 rounded-2xl border-2 border-pink-200 space-y-2 text-xs">
                          <p className="text-[10px] font-bold text-pink-400 uppercase tracking-wider px-1">Resultados</p>
                          {searchResults.map((user) => (
                            <div
                              key={user.id}
                              onClick={() => startOrOpenChat(user)}
                              className="flex items-center justify-between p-2 hover:bg-white rounded-xl cursor-pointer transition-all border border-transparent hover:border-pink-200 btn-squish"
                            >
                              <div className="flex items-center gap-2">
                                <img src={user.avatar_url || `https://api.dicebear.com/7.x/adventurer/svg?seed=${user.nick}`} alt="" className="w-8 h-8 rounded-full bg-white" />
                                <div>
                                  <p className="font-bold text-xs">{user.nick}</p>
                                  <p className="text-[10px] text-pink-400">ID: #{user.tag}</p>
                                </div>
                              </div>
                              <span className="text-[10px] bg-pink-200 text-pink-700 px-2 py-0.5 rounded-full font-bold">Conversar</span>
                            </div>
                          ))}
                        </div>
                      )}

                      <div className="space-y-2">
                        <p className="text-[10px] font-bold text-pink-400 uppercase tracking-wider px-1">Conversas</p>
                        {myChats.length === 0 ? (
                          <p className="text-center text-xs text-pink-400 py-6 font-bold">Nenhuma conversa ativa.🍭</p>
                        ) : (
                          myChats.map((chat) => {
                            const partner = getChatPartner(chat);
                            return (
                              <div
                                key={chat.id}
                                onClick={() => { playSquishSound('bubble'); setActiveChat(chat); loadChatMessages(chat.id); }}
                                className={`flex items-center justify-between p-3 rounded-2xl cursor-pointer transition-all border-2 btn-squish ${activeChat?.id === chat.id ? 'bg-pink-100 border-pink-300 shadow-inner' : 'bg-pink-50 border-transparent hover:border-pink-200'}`}
                              >
                                <div className="flex items-center gap-3">
                                  <div className="relative">
                                    <img src={partner.avatar_url || `https://api.dicebear.com/7.x/adventurer/svg?seed=${partner.nick}`} alt="" className="w-10 h-10 rounded-full bg-white border border-pink-200" />
                                    {partner.is_online && (
                                      <span className="absolute bottom-0 right-0 w-3 h-3 bg-green-400 border-2 border-white rounded-full animate-pulse" />
                                    )}
                                  </div>
                                  <div>
                                    <h4 className="font-bold text-xs flex items-center gap-1">
                                      {partner.nick} <span className="text-[10px] text-pink-400 font-mono">#{partner.tag}</span>
                                    </h4>
                                    <p className="text-[10px] text-pink-500 truncate max-w-[150px]">{partner.recado}</p>
                                  </div>
                                </div>
                              </div>
                            );
                          })
                        )}
                      </div>
                    </div>
                  )}

                  {activeTab === 'rank' && (
                    <div className="space-y-2 text-xs">
                      <p className="text-center text-xs font-bold text-pink-500 mb-2">🏆 TOP 10 GLOBAL DE PODER 🏆</p>
                      {allProfiles
                        .sort((a, b) => (b.power || 0) - (a.power || 0))
                        .slice(0, 10)
                        .map((prof, idx) => {
                          const isFirst = idx === 0;
                          return (
                            <div
                              key={prof.id}
                              className={`flex items-center justify-between p-3 rounded-2xl transition-all ${isFirst ? 'bg-gradient-to-r from-yellow-100 via-pink-100 to-yellow-100 border-4 border-yellow-400 animate-pulse ring-4 ring-pink-300' : 'bg-pink-50 border-2 border-transparent'}`}
                            >
                              <div className="flex items-center gap-3">
                                <span className={`text-sm font-black ${isFirst ? 'text-yellow-600' : 'text-pink-500'}`}>#{idx + 1}</span>
                                <img src={prof.avatar_url || `https://api.dicebear.com/7.x/adventurer/svg?seed=${prof.nick}`} alt="" className="w-9 h-9 rounded-full bg-white border border-pink-200" />
                                <div>
                                  <h4 className="font-bold text-xs flex items-center gap-1">{prof.nick} {isFirst && '👑'}</h4>
                                  <p className="text-[10px] text-pink-400 font-mono">#{prof.tag}</p>
                                </div>
                              </div>
                              <div className="text-right">
                                <span className="text-xs font-black text-pink-600">{prof.power || 0} ⭐</span>
                              </div>
                            </div>
                          );
                        })}
                    </div>
                  )}

                  {activeTab === 'shop' && (
                    <div className="grid grid-cols-1 gap-3">
                      <div className="bg-pink-100 p-2.5 rounded-2xl border border-pink-200 text-center">
                        <p className="text-xs font-bold text-pink-600">O que vais comprar com as tuas PinkCoins?</p>
                      </div>
                      
                      <div className="bg-white p-3 rounded-2xl border-2 border-pink-200 flex items-center justify-between">
                        <div>
                          <h4 className="font-extrabold text-xs text-pink-600">😈 Carta Troll</h4>
                          <p className="text-[10px] text-pink-400">Edita 1 mensagem do teu amigo.</p>
                          <span className="text-[11px] font-black text-pink-500 font-mono">500 🌸</span>
                        </div>
                        <button onClick={() => buyStoreItem('Troll', 500)} className="bg-pink-400 hover:bg-pink-500 text-white font-bold text-xs px-3 py-1.5 rounded-xl active:scale-95 transition-all btn-squish">Comprar</button>
                      </div>

                      <div className="bg-white p-3 rounded-2xl border-2 border-pink-200 flex items-center justify-between">
                        <div>
                          <h4 className="font-extrabold text-xs text-pink-600">⭐ Poder Estelar</h4>
                          <p className="text-[10px] text-pink-400">Dá +1 de poder a um amigo teu.</p>
                          <span className="text-[11px] font-black text-pink-500 font-mono">1.000 🌸</span>
                        </div>
                        <button onClick={() => buyStoreItem('Poder', 1000)} className="bg-pink-400 hover:bg-pink-500 text-white font-bold text-xs px-3 py-1.5 rounded-xl active:scale-95 transition-all btn-squish">Comprar</button>
                      </div>

                      <div className="bg-white p-3 rounded-2xl border-2 border-pink-200 flex items-center justify-between">
                        <div>
                          <h4 className="font-extrabold text-xs text-pink-600">✏️ Troca de Nick</h4>
                          <p className="text-[10px] text-pink-400">Muda a tua alcunha instantaneamente.</p>
                          <span className="text-[11px] font-black text-pink-500 font-mono">2.000 🌸</span>
                        </div>
                        <button onClick={() => buyStoreItem('Troca de Nick', 2000)} className="bg-pink-400 hover:bg-pink-500 text-white font-bold text-xs px-3 py-1.5 rounded-xl active:scale-95 transition-all btn-squish">Comprar</button>
                      </div>
                    </div>
                  )}

                  {activeTab === 'profile' && (
                    <div className="space-y-4">
                      <div className="bg-pink-100 p-2.5 rounded-2xl border border-pink-200 text-center text-xs font-bold text-pink-600">
                        ⚠️ Necessitas de pelo menos <span className="underline">80% de energia</span> para salvar!
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-pink-500 mb-1">🔗 URL DA FOTO DE PERFIL</label>
                        <input
                          type="text"
                          value={avatarInput}
                          onChange={(e) => setAvatarInput(e.target.value)}
                          placeholder="Ex: https://api.dicebear.com/..."
                          className="w-full px-3 py-2 bg-pink-50 border-2 border-pink-200 rounded-xl focus:outline-none focus:border-pink-400 text-xs text-pink-700 shadow-inner"
                        />
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-pink-500 mb-1">💬 RECADO / STATUS</label>
                        <input
                          type="text"
                          value={recadoInput}
                          onChange={(e) => setRecadoInput(e.target.value)}
                          placeholder="Ex: A saborear um doce! 🍭"
                          className="w-full px-3 py-2 bg-pink-50 border-2 border-pink-200 rounded-xl focus:outline-none focus:border-pink-400 text-xs text-pink-700 shadow-inner"
                        />
                      </div>

                      <button onClick={updateProfileSettings} className="w-full bg-pink-400 hover:bg-pink-500 text-white font-bold py-3 rounded-xl shadow-md transition-all text-xs btn-squish">Salvar Definições ✨</button>
                      <button onClick={handleLogout} className="w-full bg-red-100 hover:bg-red-200 text-red-600 font-bold py-3 rounded-xl transition-all text-xs mt-4 btn-squish">Terminar Sessão 👋</button>
                    </div>
                  )}
                </div>
              </div>

              {/* Conversas Ativas */}
              <div className="flex-1 flex flex-col bg-white bg-opacity-80 backdrop-blur-md rounded-3xl border-4 border-pink-200 shadow-xl overflow-hidden h-[55%] md:h-full relative">
                {activeChat ? (
                  <>
                    <div className="bg-pink-100 p-4 border-b-2 border-pink-200 flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <img src={getChatPartner(activeChat).avatar_url || `https://api.dicebear.com/7.x/adventurer/svg?seed=${getChatPartner(activeChat).nick}`} alt="" className="w-10 h-10 rounded-full bg-white border border-pink-200" />
                        <div>
                          <h3 className="font-extrabold text-sm text-pink-700 flex items-center gap-1">
                            {getChatPartner(activeChat).nick}
                            <span className="text-[10px] text-pink-400 font-mono">#{getChatPartner(activeChat).tag}</span>
                          </h3>
                          <p className="text-[10px] text-pink-500 font-mono">
                            {getChatPartner(activeChat).is_online ? <span className="text-green-500 font-bold font-sans">Online</span> : <span>Visto em: {new Date(getChatPartner(activeChat).last_seen || Date.now()).toLocaleDateString('pt-PT')}</span>}
                          </p>
                        </div>
                      </div>

                      <div className="flex items-center gap-2">
                        <button onClick={() => toggleBlockUser(getChatPartner(activeChat).id)} className="text-xs font-bold bg-pink-200 hover:bg-pink-300 text-pink-700 px-3 py-1.5 rounded-xl transition-all btn-squish">
                          {blocksList.includes(getChatPartner(activeChat).id) ? "Desbloquear" : "Bloquear"}
                        </button>
                        <button onClick={clearCurrentChat} className="text-xs font-bold bg-pink-200 hover:bg-pink-300 text-pink-700 px-3 py-1.5 rounded-xl transition-all btn-squish">🧹</button>
                        <button onClick={deleteCurrentChat} className="text-xs font-bold bg-red-100 hover:bg-red-200 text-red-600 px-3 py-1.5 rounded-xl transition-all btn-squish">🗑️</button>
                      </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-pink-50 bg-opacity-30">
                      {currentChatMessages.map((msg) => {
                        const isMe = msg.sender_id === currentUser.id;
                        return (
                          <div key={msg.id} onClick={() => trollMessage(msg)} className={`flex flex-col max-w-[70%] p-3.5 rounded-2xl relative transition-all ${isMe ? 'ml-auto bg-pink-400 text-white rounded-br-none shadow-sm' : 'mr-auto bg-white text-pink-800 rounded-bl-none border border-pink-200 shadow-sm cursor-pointer hover:border-pink-400'}`}>
                            {msg.media_type === 'audio' ? (
                              <div className="flex items-center gap-2 py-1">
                                <span className="text-xl">🎙️</span>
                                <div className="w-32 bg-pink-300 rounded-full h-2 overflow-hidden">
                                  <div className="bg-pink-600 h-full w-[60%]" />
                                </div>
                                <span className="text-[10px] font-mono">0:12</span>
                              </div>
                            ) : msg.media_type === 'image' ? (
                              <div className="mb-2 rounded-lg overflow-hidden border border-pink-100 max-w-[240px]">
                                <img src={msg.media_url} alt="Envio Doce" className="w-full h-auto object-cover" />
                              </div>
                            ) : (
                              <p className="text-xs font-semibold leading-relaxed break-words">{msg.text}</p>
                            )}

                            <div className="flex items-center justify-between gap-4 mt-1">
                              <span className="text-[9px] opacity-60 self-end font-mono">
                                {new Date(msg.created_at).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' })}
                              </span>
                              {msg.is_edited && <span className="text-[9px] bg-purple-200 text-purple-700 px-1.5 rounded-full font-bold">Trollado! 😈</span>}
                            </div>
                          </div>
                        );
                      })}
                      <div ref={messagesEndRef} />
                    </div>

                    <form onSubmit={sendMessage} className="p-4 bg-white border-t-2 border-pink-100 flex items-center gap-3 relative">
                      {pendingPinkCoins > 0 && (
                        <div className="absolute -top-7 left-5 bg-pink-500 text-white text-[10px] font-black px-2.5 py-0.5 rounded-full shadow-md animate-pulse">
                          + {pendingPinkCoins} PinkCoins...
                        </div>
                      )}

                      <button type="button" onClick={() => fileInputRef.current.click()} className="p-2.5 bg-pink-100 hover:bg-pink-200 text-pink-600 rounded-full hover:scale-105 active:scale-95 transition-all text-sm btn-squish">📷</button>
                      <input type="file" ref={fileInputRef} onChange={handleImageUpload} accept="image/*" className="hidden" />

                      <button type="button" onClick={toggleRecording} className={`p-2.5 rounded-full hover:scale-105 active:scale-95 transition-all text-sm ${isRecording ? 'bg-red-400 text-white animate-pulse' : 'bg-pink-100 text-pink-600 hover:bg-pink-200'} btn-squish`}>🎙️</button>

                      <input type="text" value={messageInput} onChange={handleTyping} placeholder="Escreve uma mensagem doce..." className="flex-1 px-4 py-3 bg-pink-50 border-2 border-pink-200 rounded-2xl focus:outline-none focus:border-pink-400 transition-colors text-xs font-semibold shadow-inner" />
                      <button type="submit" className="bg-pink-400 hover:bg-pink-500 active:scale-95 text-white font-black px-5 py-3 rounded-2xl shadow-md border-b-4 border-pink-600 text-xs btn-squish">Enviar 🍬</button>
                    </form>
                  </>
                ) : (
                  <div className="flex-1 flex flex-col items-center justify-center p-8 text-center">
                    <span className="text-6xl animate-bounce">🍭</span>
                    <h3 className="font-extrabold text-lg text-pink-500 mt-4">Bem-vindo ao Candy Clash Sugar!</h3>
                    <p className="text-xs text-pink-400 max-w-sm mt-2">Escolhe ou pesquisa uma alcunha para começar!</p>
                  </div>
                )}
              </div>

            </div>
          )}

          {/* Modal Mochila */}
          {isBagOpen && (
            <div className="absolute inset-0 z-50 bg-black bg-opacity-40 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white bg-opacity-95 border-4 border-pink-300 p-6 rounded-3xl max-w-sm w-full shadow-2xl relative">
                <h3 className="text-center font-extrabold text-lg text-pink-600 mb-4">🎒 A Minha Mochila Doce</h3>
                <div className="space-y-3 max-h-[250px] overflow-y-auto">
                  {getInventory(currentUser).length === 0 ? (
                    <p className="text-center text-xs text-pink-400 py-6">Mochila vazia. Visita a Lojinha! 🍬</p>
                  ) : (
                    getInventory(currentUser).map((item, idx) => (
                      <div key={idx} className="bg-pink-50 p-3 rounded-2xl border border-pink-200 flex justify-between items-center">
                        <div>
                          <p className="font-extrabold text-xs text-pink-700">{item.name}</p>
                          <p className="text-[10px] text-pink-400">{item.desc}</p>
                        </div>
                        <button onClick={() => useInventoryItem(item.name)} className="bg-pink-400 hover:bg-pink-500 text-white font-bold text-[10px] px-3 py-1.5 rounded-xl transition-all active:scale-95 btn-squish">Usar</button>
                      </div>
                    ))
                  )}
                </div>
                <button onClick={() => { playSquishSound('pop'); setIsBagOpen(false); }} className="mt-6 w-full bg-pink-200 hover:bg-pink-300 text-pink-700 font-extrabold py-3 rounded-2xl text-xs transition-colors btn-squish">Fechar Mochila</button>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Renderização no elemento root
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
